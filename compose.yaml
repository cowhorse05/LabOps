name: labops

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD in .env}
      MYSQL_DATABASE: labops
      MYSQL_USER: labops
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD in .env}
    volumes:
      - mysql-data:/var/lib/mysql
    networks: [backend]
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 20

  server:
    image: labops-server:${LABOPS_VERSION:-dev}
    build: { context: ./server }
    restart: unless-stopped
    environment:
      LABOPS_ENV: production
      LABOPS_ADDR: ":8080"
      LABOPS_DB_DRIVER: mysql
      LABOPS_MYSQL_DSN: ${LABOPS_MYSQL_DSN:?set LABOPS_MYSQL_DSN in .env}
      LABOPS_BOOTSTRAP_ADMIN_PASSWORD: ${LABOPS_BOOTSTRAP_ADMIN_PASSWORD:-}
      LABOPS_ENCRYPTION_KEY: ${LABOPS_ENCRYPTION_KEY:?set LABOPS_ENCRYPTION_KEY in .env}
      LABOPS_PUBLIC_ORIGIN: https://${SERVER_HOST:?set SERVER_HOST in .env}
      LABOPS_HEARTBEAT_TIMEOUT: 35s
      LABOPS_TASK_TIMEOUT: 5m
    depends_on:
      mysql: { condition: service_healthy }
    networks: [backend, egress]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 15s
      timeout: 5s
      retries: 10

  web:
    image: labops-web:${LABOPS_VERSION:-dev}
    build: { context: ./web }
    restart: unless-stopped
    environment:
      SERVER_HOST: ${SERVER_HOST:?set SERVER_HOST in .env}
      TLS_CERT_PATH: /etc/letsencrypt/live/${SERVER_HOST}/fullchain.pem
      TLS_KEY_PATH: /etc/letsencrypt/live/${SERVER_HOST}/privkey.pem
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./deploy/acme-webroot:/var/www/certbot
    depends_on:
      server: { condition: service_healthy }
    networks: [backend, edge]

networks:
  backend:
    internal: true
  egress: {}
  edge: {}

volumes:
  mysql-data:
