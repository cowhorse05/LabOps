name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  server:
    name: Server (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race ./... -count=1

  agent:
    name: Agent (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race ./... -count=1

  web:
    name: Web (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: install
        run: npm ci

      - name: type check
        run: npx tsc --noEmit

      - name: unit test
        run: npm test

      - name: production dependency audit
        run: npm audit --omit=dev

      - name: build
        run: npm run build

  containers:
    name: Containers and Compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: validate production compose
        env:
          SERVER_HOST: 192.0.2.1
          MYSQL_ROOT_PASSWORD: ci-root-password
          MYSQL_PASSWORD: ci-app-password
          LABOPS_MYSQL_DSN: labops:ci-app-password@tcp(mysql:3306)/labops?parseTime=true&charset=utf8mb4
          LABOPS_BOOTSTRAP_ADMIN_PASSWORD: ci-bootstrap-password
          LABOPS_ENCRYPTION_KEY: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
        run: docker compose config --quiet
      - name: build images
        run: docker build -t labops-server:ci server && docker build -t labops-agent:ci agent && docker build -t labops-web:ci web
